<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Primera Web</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f4f8;
            color: #333;
        }
        h1 {
            color: #2c3e50;
            font-size: 3rem;
        }
        p {
            font-size: 1.2rem;
            color: #555;
            max-width: 600px;
            text-align: center;
        }
        .container {
            background: white;
            padding: 2rem 4rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>¡Hola Mundo! 🚀</h1>
        <p>Esta es mi primera página web estática. Pronto habrá cosas increíbles aquí.</p>
    </div>
</body>
</html>
